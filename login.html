<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Tall Bridge</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav>
    <ul class="loginav">
      <li><a href="index.html" class="btn-ghost">Back</a></li>
      <li><a href="signup.html" class="btn-dark">Signup</a></li>
    </ul>
  </nav>
    <div class="auth-section">
        <div class="auth-card">
            <h2>Welcome back to <br><em>Tall Bridge.</em></h2>
            <button class="btn-google">Login with Google</button>
            <div class="divider"><span>or</span></div>
            <form onsubmit="handleLogin(event)">
                <input type="email" placeholder="Email Address" required>
                <input type="password" placeholder="Password" required>
                <button type="submit" class="btn-dark" style="width:100%">Login</button>
            </form>
        </div>
    </div>
</body>
</html>
